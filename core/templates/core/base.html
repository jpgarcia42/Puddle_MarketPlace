<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {% endblock %} | Puddle</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
  </head>

  <body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col antialiased">
    <!-- Navbar -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 transition-all duration-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <a href="{% url 'core:index' %}" class="flex items-center gap-2 group">
            <div class="h-8 w-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-md shadow-blue-500/20 group-hover:scale-105 transition-transform duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-white">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
              </svg>
            </div>
            <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-slate-900 bg-clip-text text-transparent">Puddle</span>
          </a>

          <!-- Nav Links -->
          <nav class="hidden md:flex items-center space-x-1">
            <a href="{% url 'core:index' %}" class="px-3.5 py-2 text-sm font-medium text-slate-600 hover:text-blue-600 rounded-lg hover:bg-slate-50 transition-all duration-200">Home</a>
            <a href="{% url 'item:items' %}" class="px-3.5 py-2 text-sm font-medium text-slate-600 hover:text-blue-600 rounded-lg hover:bg-slate-50 transition-all duration-200">Pesquisar</a>
            <a href="{% url 'core:contact' %}" class="px-3.5 py-2 text-sm font-medium text-slate-600 hover:text-blue-600 rounded-lg hover:bg-slate-50 transition-all duration-200">Contato</a>
          </nav>

          <!-- Action Buttons -->
          <div class="flex items-center gap-3">
            <a href="{% url 'item:new' %}" class="hidden sm:inline-flex items-center gap-1.5 px-4 py-2 text-xs font-semibold text-white bg-slate-900 rounded-xl hover:bg-slate-800 transition-all duration-200 shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
              Novo Item
            </a>
            
            <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

            {% if request.user.is_authenticated %}
              <a href="{% url 'conversation:inbox' %}" class="relative p-2 text-slate-600 hover:text-blue-600 hover:bg-slate-50 rounded-xl transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.076-4.076a1.526 1.526 0 0 1 1.037-.443 48.282 48.282 0 0 0 5.68-.494c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
                </svg>
              </a>
              <a href="{% url 'dashboard:index' %}" class="inline-flex items-center gap-1 px-4 py-2 text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-xl transition-all duration-200">
                Dashboard
              </a>
              <form action="{% url 'core:logout' %}" method="post" class="inline">
                {% csrf_token %}
                <button type="submit" class="p-2 text-slate-400 hover:text-red-500 rounded-xl hover:bg-red-50 transition-all duration-200">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
                  </svg>
                </button>
              </form>
            {% else %}
              <a href="{% url 'core:login' %}" class="px-4 py-2 text-sm font-semibold text-slate-700 hover:text-blue-600 rounded-xl transition-all duration-200">Login</a>
              <a href="{% url 'core:signup' %}" class="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-all duration-200 shadow-sm shadow-blue-600/10">Criar Conta</a>
            {% endif %}
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow">
      {% block content %} {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 mt-auto">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-blue-600 to-slate-900 bg-clip-text text-transparent">Puddle</span>
            <span class="text-xs text-slate-400">|</span>
            <p class="text-xs text-slate-500">&copy; 2026 Puddle Marketplace. Todos os direitos reservados.</p>
          </div>
          <div class="flex items-center gap-4 text-xs text-slate-400">
            <a href="https://jpgdigitalagency.vercel.app/" target="_blank" rel="noopener" class="text-slate-500 hover:text-blue-600 transition-colors">JPG Digital Agency</a>
            <span>•</span>
            <a href="{% url 'core:contact' %}" class="text-slate-500 hover:text-blue-600 transition-colors">Suporte</a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
